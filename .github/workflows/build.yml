name: Build WordCount Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
          xcode-select -p

      - name: Install Qt6 via Homebrew
        run: |
          brew install qt

      - name: Set Qt6 environment variables
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt)/lib/cmake" >> $GITHUB_ENV
          echo "$(brew --prefix qt)/bin" >> $GITHUB_PATH

      - name: Display system information
        run: |
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "macOS Build: $(sw_vers -buildVersion)"
          echo "Architecture: $(uname -m)"
          echo "CPU Cores: $(sysctl -n hw.ncpu)"
          echo "Qt6 Path: $(brew --prefix qt)"

      - name: List project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo ""
          echo "=== ndd-plugin Directory ==="
          ls -la ndd-plugin/
          echo ""
          echo "=== Check CMakeLists.txt ==="
          if [ -f "ndd-plugin/CMakeLists.txt" ]; then
            echo "✓ ndd-plugin/CMakeLists.txt found"
            head -5 ndd-plugin/CMakeLists.txt
          else
            echo "✗ ndd-plugin/CMakeLists.txt NOT found"
          fi

      - name: Configure CMake
        working-directory: ./ndd-plugin
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt)/lib/cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        working-directory: ./ndd-plugin
        run: |
          set -e  # Exit on error
          cmake --build build --config Release -- -j$(sysctl -n hw.ncpu) || {
            echo "❌ Build failed!"
            exit 1
          }

      - name: Verify build artifacts
        run: |
          echo "=== Verifying Build ==="
          echo ""
          echo "Looking for .dylib files..."
          DYLIB_FILES=$(find ndd-plugin/build -name "*.dylib" -type f)
          echo "$DYLIB_FILES"
          echo ""

          # Check if libWordCount.dylib exists
          DYLIB_PATH="ndd-plugin/build/src/wordcount/libWordCount.dylib"
          if [ ! -f "$DYLIB_PATH" ]; then
            echo "❌ libWordCount.dylib NOT FOUND!"
            echo "Looking for alternatives..."
            find ndd-plugin/build -name "*.dylib" -type f
            exit 1
          fi

          # Check file size
          FILE_SIZE=$(stat -f%z "$DYLIB_PATH" 2>/dev/null || stat -c%s "$DYLIB_PATH" 2>/dev/null)
          echo "File size: $FILE_SIZE bytes"

          # Reject very small files
          if [ "$FILE_SIZE" -lt 10000 ]; then
            echo "❌ ERROR: Plugin file is too small ($FILE_SIZE bytes)! Build likely failed."
            echo "File content:"
            file "$DYLIB_PATH"
            hexdump -C "$DYLIB_PATH" | head -5
            exit 1
          fi

          echo "✅ Plugin file size looks OK"

      - name: Analyze plugin dependencies
        run: |
          DYLIB_PATH="ndd-plugin/build/src/wordcount/libWordCount.dylib"
          echo "=== Plugin Dependencies ==="
          otool -L "$DYLIB_PATH"
          echo ""
          echo "=== Plugin Symbols (first 30) ==="
          nm -g "$DYLIB_PATH" | head -30

      - name: List build artifacts
        run: |
          echo "=== Final Build Output ==="
          ls -lh ndd-plugin/build/src/wordcount/

      - name: Set file permissions
        run: |
          chmod 755 ndd-plugin/build/src/wordcount/libWordCount.dylib
          ls -lh ndd-plugin/build/src/wordcount/libWordCount.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-macos-15
          path: |
            ndd-plugin/build/src/wordcount/libWordCount.dylib
            ndd-plugin/build/plugin.json
          retention-days: 30

  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt6
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-base-private-dev

      - name: Display system information
        run: |
          echo "Ubuntu Version: $(lsb_release -ds)"
          echo "Architecture: $(uname -m)"
          echo "CPU Cores: $(nproc)"

      - name: List project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo ""
          echo "=== ndd-plugin Directory ==="
          ls -la ndd-plugin/
          echo ""
          echo "=== Check CMakeLists.txt ==="
          if [ -f "ndd-plugin/CMakeLists.txt" ]; then
            echo "✓ ndd-plugin/CMakeLists.txt found"
            head -5 ndd-plugin/CMakeLists.txt
          else
            echo "✗ ndd-plugin/CMakeLists.txt NOT found"
          fi

      - name: Configure CMake
        working-directory: ./ndd-plugin
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        working-directory: ./ndd-plugin
        run: |
          cmake --build build --config Release -- -j$(nproc)

      - name: List build artifacts
        run: |
          echo "=== Build Output ==="
          find ndd-plugin/build -name "*.so" 2>/dev/null
          echo ""
          echo "=== Plugin Directory ==="
          ls -lh ndd-plugin/build/src/wordcount/ 2>/dev/null || echo "Plugin directory not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-linux
          path: |
            ndd-plugin/build/src/wordcount/libWordCount.so
            ndd-plugin/build/plugin.json
          retention-days: 30
