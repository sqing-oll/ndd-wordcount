name: Build WordCount Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
          xcode-select -p

      - name: Install Qt5 via Homebrew
        run: |
          brew install qt@5

      - name: Set Qt5 environment variables
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake" >> $GITHUB_ENV
          echo "$(brew --prefix qt@5)/bin" >> $GITHUB_PATH

      - name: Display system information
        run: |
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "macOS Build: $(sw_vers -buildVersion)"
          echo "Architecture: $(uname -m)"
          echo "CPU Cores: $(sysctl -n hw.ncpu)"
          echo "Qt5 Path: $(brew --prefix qt@5)"

      - name: List project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo ""
          echo "=== ndd-plugin Directory ==="
          ls -la ndd-plugin/
          echo ""
          echo "=== Check CMakeLists.txt ==="
          if [ -f "ndd-plugin/CMakeLists.txt" ]; then
            echo "✓ ndd-plugin/CMakeLists.txt found"
            head -5 ndd-plugin/CMakeLists.txt
          else
            echo "✗ ndd-plugin/CMakeLists.txt NOT found"
          fi

      - name: Configure CMake
        working-directory: ./ndd-plugin
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        working-directory: ./ndd-plugin
        run: |
          cmake --build build --config Release -- -j$(sysctl -n hw.ncpu)

      - name: List build artifacts
        run: |
          echo "=== Build Output ==="
          find ndd-plugin/build -name "*.dylib" -o -name "*.so" 2>/dev/null
          echo ""
          echo "=== Plugin Directory ==="
          ls -lh ndd-plugin/build/src/wordcount/ 2>/dev/null || echo "Plugin directory not found"

      - name: Set file permissions
        run: |
          if [ -f "ndd-plugin/build/src/wordcount/libWordCount.dylib" ]; then
            chmod 755 ndd-plugin/build/src/wordcount/libWordCount.dylib
            ls -lh ndd-plugin/build/src/wordcount/libWordCount.dylib
            file ndd-plugin/build/src/wordcount/libWordCount.dylib
          else
            echo "Warning: libWordCount.dylib not found in expected location"
            find ndd-plugin/build -name "*.dylib" -type f
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-macos-15
          path: |
            ndd-plugin/libWordCount.dylib
            ndd-plugin/plugin.json
          retention-days: 30

  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools

      - name: Display system information
        run: |
          echo "Ubuntu Version: $(lsb_release -ds)"
          echo "Architecture: $(uname -m)"
          echo "CPU Cores: $(nproc)"

      - name: List project structure
        run: |
          echo "=== Project Root ==="
          ls -la
          echo ""
          echo "=== ndd-plugin Directory ==="
          ls -la ndd-plugin/
          echo ""
          echo "=== Check CMakeLists.txt ==="
          if [ -f "ndd-plugin/CMakeLists.txt" ]; then
            echo "✓ ndd-plugin/CMakeLists.txt found"
            head -5 ndd-plugin/CMakeLists.txt
          else
            echo "✗ ndd-plugin/CMakeLists.txt NOT found"
          fi

      - name: Configure CMake
        working-directory: ./ndd-plugin
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        working-directory: ./ndd-plugin
        run: |
          cmake --build build --config Release -- -j$(nproc)

      - name: List build artifacts
        run: |
          echo "=== Build Output ==="
          find ndd-plugin/build -name "*.so" 2>/dev/null
          echo ""
          echo "=== Plugin Directory ==="
          ls -lh ndd-plugin/build/src/wordcount/ 2>/dev/null || echo "Plugin directory not found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-linux
          path: |
            ndd-plugin/build/src/wordcount/libWordCount.so
            ndd-plugin/build/plugin.json
          retention-days: 30
