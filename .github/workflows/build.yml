name: 编译Notepad--字数统计插件
on: [push, workflow_dispatch]

jobs:
  build-mac:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # 安装依赖
      - name: 安装Qt5和CMake
        run: brew install qt@5 cmake

      # 关键修复：进入 ndd-plugin 目录再编译！
      - name: 编译插件
        run: |
          cd ndd-plugin  # ← 这一行是修复核心！
          mkdir build
          cd build
          cmake -DCMAKE_PREFIX_PATH=/usr/local/opt/qt@5/lib/cmake ..
          make -j4

      # 上传编译好的插件
      - name: 打包插件文件
        uses: actions/upload-artifact@v4
        with:
          name: WordCount-Plugin
          path: ndd-plugin/build/src/wordcount/libWordCount.dylib
