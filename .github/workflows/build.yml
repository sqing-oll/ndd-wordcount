name: Build WordCount Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Xcode Command Line Tools
        run: |
          xcode-select --install || true
          xcode-select -p

      - name: Install Qt5 via Homebrew
        run: |
          brew install qt@5

      - name: Set Qt5 environment variables
        run: |
          echo "CMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake" >> $GITHUB_ENV
          echo "$(brew --prefix qt@5)/bin" >> $GITHUB_PATH

      - name: Display system info
        run: |
          echo "macOS Version: $(sw_vers -productVersion)"
          echo "Architecture: $(uname -m)"
          echo "Qt5 Path: $(brew --prefix qt@5)"
          echo "Workspace: ${{ github.workspace }}"

      - name: List project structure
        run: |
          echo "=== Project Root ==="
          ls -la ${{ github.workspace }}
          echo ""
          echo "=== Source Directory ==="
          ls -la ${{ github.workspace }}/src 2>/dev/null || echo "src directory not found"
          echo ""
          echo "=== Check CMakeLists.txt ==="
          test -f "${{ github.workspace }}/CMakeLists.txt" && echo "✓ CMakeLists.txt found" || echo "✗ CMakeLists.txt NOT found"
          cat "${{ github.workspace }}/CMakeLists.txt" 2>/dev/null | head -5

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -S ${{ github.workspace }} -B build \
            -DCMAKE_PREFIX_PATH=$(brew --prefix qt@5)/lib/cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        run: |
          cd build
          make -j$(sysctl -n hw.ncpu)

      - name: List build artifacts
        run: |
          find build -name "*.dylib" -o -name "*.so" 2>/dev/null | head -20

      - name: Set file permissions
        run: |
          if [ -f "build/src/wordcount/libWordCount.dylib" ]; then
            chmod 755 build/src/wordcount/libWordCount.dylib
            ls -lh build/src/wordcount/libWordCount.dylib
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-macos-15
          path: |
            build/src/wordcount/libWordCount.*
            build/src/wordcount/plugin.json
          retention-days: 30

  build-ubuntu:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y qtbase5-dev qtchooser qt5-qmake qtbase5-dev-tools

      - name: Display workspace
        run: |
          echo "Workspace: ${{ github.workspace }}"
          echo "=== Project Root ==="
          ls -la ${{ github.workspace }}

      - name: List project structure
        run: |
          echo "=== Check CMakeLists.txt ==="
          test -f "${{ github.workspace }}/CMakeLists.txt" && echo "✓ CMakeLists.txt found" || echo "✗ CMakeLists.txt NOT found"
          cat "${{ github.workspace }}/CMakeLists.txt" 2>/dev/null | head -5

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -S ${{ github.workspace }} -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build plugin
        run: |
          cd build
          make -j$(nproc)

      - name: List build artifacts
        run: |
          find build -name "*.so" 2>/dev/null | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wordcount-plugin-linux
          path: |
            build/src/wordcount/libWordCount.*
            build/src/wordcount/plugin.json
          retention-days: 30
